name: Build and publish website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build site (exercises + instructor)
        working-directory: course_notes
        run: make all

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: course_notes/_site

