          contents:
            - videos/videor_1.qmd
            - videos/videor_2.qmd

filters:
  - filters/wrap-plain-code.lua
  - filters/solution-callout.lua
  
format:
  html:
    toc: true
    number-sections: true
    css: styling/styles.css
    theme:
      light: cosmo
      dark: [darkly, styling/theme-dark.scss]
    respect-user-color-scheme: true

