[workspace]
authors = ["Mads-Peter <machri@phys.au.dk>"]
channels = ["conda-forge", "anaconda"]
name = "structure_biology"
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]
version = "0.1.0"

[activation]
env = { TYPST_FONT_PATHS = "$PIXI_PROJECT_ROOT/fonts" }

[environments]
default = {features=[]}
dev = {features=["git-tools"]}

[tasks.preview]
args = [{ "arg" = "mode", default = "solution", choices=["exercise", "solution"]}]
cmd = "quarto preview --profile {{mode}}"
cwd = "course_notes"
description = "Preview the course notes in either exercise or solution mode"
depends-on = ["fetch-fonts"]

[tasks.render]
args = [{ "arg" = "mode", default = "solution", choices=["exercise", "solution"]}]
cmd = "quarto render --profile {{mode}}"
cwd = "course_notes"
description = "Render the course notes in either exercise or solution mode"
depends-on = ["fetch-fonts"]

[tasks.render-all]
depends-on = ["clean", "npm-install",
            {task = "render", args=["exercise"]},
            {task = "render", args=["solution"]},
            "encrypt-answers"]
description = "Clean and render the course notes in both exercise and solution mode"

[tasks.check-pymol-scripts]
cmd = """python scripts/check_scripts.py --directory course_notes/exercises/pymol_scripts;
python scripts/check_scripts.py --directory course_notes/files/"""

[tasks.check-script]
cmd = """python scripts/check_scripts.py --file $INIT_CWD/{{file}}"""
args = [{ "arg" = "file"}]
description = "Check a specific PyMOL script for syntax errors"

[tasks.check-figures]
cmd = """python scripts/check_figures.py"""
description = "Check all figures for references in .qmd files"

[tasks.check-downloads]
cmd = """python scripts/check_downloads.py"""
description = "Check that all download links in the course notes are valid"

[tasks.npm-install]
cmd = "npm install"
description = "Install npm dependencies"
inputs = ["package.json"]
outputs = ["node_modules"]

[tasks.encrypt-answers]
cmd = "python scripts/encrypt_answers.py"
description = "Encrypt the answer pages using staticrypt"

[tasks]
clean = { cmd = ["rm", "-rf", "course_notes/_site"], description = "Clean the rendered course notes"}
github-auth = { cmd = "gh auth login && gh auth setup-git", default-environment = "dev"}

fetch-fonts = { cmd = """
  echo "Checking for Font Awesome 6 fonts..." &&
  mkdir -p fonts &&
  curl -fsSL -o 'fonts/Font Awesome 6 Free-Regular-400.otf'   'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/otfs/Font%20Awesome%206%20Free-Regular-400.otf' &&  curl -fsSL -o 'fonts/Font Awesome 6 Free-Solid-900.otf'     'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/otfs/Font%20Awesome%206%20Free-Solid-900.otf' &&
  curl -fsSL -o 'fonts/Font Awesome 6 Brands-Regular-400.otf' 'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/otfs/Font%20Awesome%206%20Brands-Regular-400.otf'
  """, description = "Download Font Awesome 6 fonts for Typst rendering (skipped if already present)", outputs=["fonts/Font Awesome 6 Free-Regular-400.otf", "fonts/Font Awesome 6 Free-Solid-900.otf", "fonts/Font Awesome 6 Brands-Regular-400.otf"]}


[dependencies]
python = "3.12.*"
quarto = ">=1.8.27,<2"
nodejs = ">=20"

[feature.git-tools.dependencies]
gh = '*'
git = '*'

[pypi-dependencies]
rich = ">=14.3.3, <15"
jupyter = ">=1.1.1, <2"
numpy = ">=2.4.4, <3"
matplotlib = ">=3.10.8, <4"
pandas = ">=3.0.2, <4"
scipy = ">=1.17.1, <2"
